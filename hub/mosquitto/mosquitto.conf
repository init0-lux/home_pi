# =============================================================================
# Mosquitto MQTT Broker Configuration
# Zapp Hub - Local-First Smart Switch System
# =============================================================================

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------

# Default MQTT listener on port 1883 (unencrypted - LAN only)
listener 1883 0.0.0.0

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------

# Allow anonymous connections by default (LAN-only deployment)
# Set to false and configure password_file for production with auth
allow_anonymous true

# Uncomment and configure for authenticated access:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------

# Enable message persistence so retained messages survive restarts
persistence true
persistence_location /mosquitto/data/

# Persist every 60 seconds
autosave_interval 60

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Log to stdout (captured by Docker / systemd)
log_dest stdout

# Log to file as well for debugging
log_dest file /mosquitto/log/mosquitto.log

# Log levels
log_type error
log_type warning
log_type notice
log_type information

# Include timestamps in log output
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------------
# Message Limits
# -----------------------------------------------------------------------------

# Maximum number of QoS 1 and 2 messages that can be queued for a client
# when the client is offline (0 = no limit)
max_queued_messages 1000

# Maximum message size in bytes (64KB is plenty for JSON payloads)
max_packet_size 65536

# Maximum number of client connections (0 = unlimited)
max_connections 200
