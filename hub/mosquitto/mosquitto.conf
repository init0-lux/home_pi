# =============================================================================
# Mosquitto MQTT Broker Configuration
# Zapp Hub — Local-First Smart Switch System
# Mosquitto 2.x compatible
# =============================================================================

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------

# Default MQTT listener on port 1883 (unencrypted — LAN only deployment)
listener 1883 0.0.0.0

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------

# Allow anonymous connections by default (LAN-only deployment).
# For production with external access, set to false and configure a password file:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
allow_anonymous true

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------

# Enable message persistence so retained messages and sessions survive restarts.
persistence true
persistence_location /mosquitto/data/

# Auto-save the in-memory database to disk every 60 seconds.
autosave_interval 60

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Log to stdout so Docker / systemd captures it in the container log stream.
log_dest stdout

# Also write to a file for persistent debugging.
log_dest file /mosquitto/log/mosquitto.log

# Log levels to capture.
log_type error
log_type warning
log_type notice
log_type information

# Include timestamps in every log line.
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------------
# Message Limits
# -----------------------------------------------------------------------------

# Maximum number of QoS 1/2 messages queued for an offline client.
max_queued_messages 1000

# Maximum MQTT packet size in bytes (64 KB is plenty for JSON payloads).
max_packet_size 65536

# Maximum number of simultaneous client connections (0 = unlimited).
max_connections 200
