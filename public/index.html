<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Home | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Smart Home</h1>
                <p style="color: var(--text-muted); font-size: 0.8rem; font-weight: 500;">Control Center</p>
            </div>
            <div id="node-indicator" class="node-indicator">
                <span class="dot"></span>
                <span class="label">Connecting...</span>
            </div>
        </header>

        <main>
            <section style="background: transparent; border: none; padding: 0; backdrop-filter: none;">
                <div class="appliances-grid" id="appliances-container">
                    <!-- Appliance cards will be injected here -->
                    <div class="card"
                        style="grid-column: 1 / -1; align-items: center; justify-content: center; height: 120px;">
                        <span style="color: var(--text-muted);">Syncing devices...</span>
                    </div>
                </div>
            </section>

            <section class="scheduler-section">
                <h2>Quick Schedule</h2>
                <form id="schedule-form" class="schedule-form">
                    <div class="form-group">
                        <label for="appliance_id">Device</label>
                        <select id="appliance_id" required>
                            <option value="1">Appliance 1</option>
                            <option value="2">Appliance 2</option>
                            <option value="3">Appliance 3</option>
                            <option value="4">Appliance 4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="target_state">Action</label>
                        <select id="target_state" required>
                            <option value="1">Turn ON</option>
                            <option value="0">Turn OFF</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="trigger_time">Schedule Time</label>
                        <input type="datetime-local" id="trigger_time" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Schedule</button>
                </form>
            </section>

            <section class="history-section">
                <h2>Activity Log</h2>
                <div class="table-container">
                    <table id="schedules-table">
                        <thead>
                            <tr>
                                <th>Device</th>
                                <th>Action</th>
                                <th>Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="schedules-body">
                            <tr>
                                <td colspan="4" class="text-center" style="color: var(--text-muted); padding: 2rem;">
                                    Loading history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
